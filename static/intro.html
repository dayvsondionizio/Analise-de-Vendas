<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
video { width:100%; height:100%; object-fit:cover; display:block; }
</style>
</head>
<body>
<video id="v" autoplay muted playsinline>
  <source src="/app/static/intro.mp4" type="video/mp4">
</video>
<script>
function done() {
  try {
    var base = window.parent.location.href.split('?')[0];
    window.parent.location.href = base + '?v=1';
  } catch(e) {}
}
var vid = document.getElementById('v');
vid.addEventListener('ended', done);
vid.addEventListener('timeupdate', function() {
  if (vid.duration && vid.currentTime >= vid.duration - 0.3) done();
});
// Fallback: fecha após 12s caso o vídeo não carregue
setTimeout(done, 12000);
</script>
</body>
</html>
